<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QR 3D — Hola Zeth!</title>
<style>
@property --h {
  syntax: "<length>";
  inherits: true;
  initial-value: 26px;
}
@property --bot {
  syntax: "<length>";
  inherits: true;
  initial-value: 0px;
}
@property --hf2 {
  syntax: "<length>";
  inherits: false;
  initial-value: 26px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: transparent;   /* fondo en ::before para liberar z-index */
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  user-select: none;
  font-family: sans-serif;
}
body::before {           /* fondo real: z-index -2, debajo del canvas */
  content: "";
  position: fixed; inset: 0;
  background: #000000;
  z-index: -2;
}

/* ---- Partículas ---- */
.particle {
  position: fixed;
  border-radius: 50%;
  background: #b400ff;
  opacity: 0;
  pointer-events: none;
  animation: drift linear infinite;
}
@keyframes drift {
  0%   { transform: translateY(100vh); opacity: 0; }
  10%  { opacity: .4; }
  90%  { opacity: .4; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

/* ---- Botón ---- */
.btn-egg {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  background: none;
  border: none;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  filter: drop-shadow(0 0 8px #7700aa);
  transition: filter .2s, transform .1s;
}
.btn-egg:hover  { filter: drop-shadow(0 0 20px #b400ff) drop-shadow(0 0 8px #38bdf8); }
.btn-egg:active { transform: translateX(-50%) scale(.93); }
.btn-egg.egg-on { filter: drop-shadow(0 0 24px #b400ff) drop-shadow(0 0 10px #38bdf8); }

/* ---- Manita pixel-art ---- */
.btn-hand {
  width: 72px;
  display: block;
}

/* ---- Texto e-PULSE ---- */
.btn-label {
  font-family: "Arial Black", "Arial", sans-serif;
  font-size: 26px;
  font-weight: 900;
  font-style: italic;
  color: #bae6fd;
  letter-spacing: 0.06em;
  white-space: nowrap;
  text-shadow:
    1px 1px 0 #0ea5e9,
    2px 2px 0 #0284c7,
    3px 3px 0 #0369a1,
    0 0 14px #38bdf8,
    0 0 30px #0284c7;
}

/* ---- Escena 3D ---- */
.scene {
  perspective: 1100px;
  perspective-origin: 50% 50%;
  transform-style: preserve-3d;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100vw;
  height: 100vh;
}
.board-wrapper {
  transform-style: preserve-3d;
  transform: rotateX(0deg) rotateZ(0deg);
  animation: float 7s ease-in-out infinite;
  cursor: grab;
  will-change: transform;
}
.board-wrapper.dragging { cursor: grabbing; }

@keyframes float {
  0%,100% { transform: rotateX(0deg) rotateZ(0deg) translateY(0); }
  50%      { transform: rotateX(0deg) rotateZ(0deg) translateY(-18px); }
}

/* ---- Marco exterior ---- */
.board-frame {
  padding: 27px;
  background: #f2e8ff;
  border: 22px solid #000;
  box-shadow:
    0 0 10px 4px #b400ff,
    0 0 28px 10px #7700aa;
  transform-style: preserve-3d;
  overflow: visible;
}

/* ---- Board ---- */
.board {
  position: relative;
  width: 550px;
  height: 550px;
  transform-style: preserve-3d;
  overflow: visible;
}

/* ---- Módulo ---- */
.module {
  position: absolute;
  width: 22px;
  height: 22px;
  transform-style: preserve-3d;
  overflow: visible;
  /* Sin transition aquí: reveal/hide la activan por inline style;
     setFrame hace snap puro (no hay CSS que pelee) */
  transform: translateZ(var(--bot));
}

/* Frame2: --hf2 bakeado inline en cada módulo; !important gana sobre inline --h */
.board.frame2 .module {
  --h: var(--hf2) !important;
}
/* Switching: bloquea transición Y animación durante el snap de frame */
.board.switching .module,
.board.switching .module .face {
  transition: none !important;
  animation:  none !important;
}

/* ---- Caras base ---- */
.face {
  position: absolute;
  transform-style: preserve-3d;
}

/* TOP — siempre sube a var(--h) */
.face.top {
  width: 22px;
  height: 22px;
  top: 0; left: 0;
  transform: translateZ(var(--h));
  /* sin transition: snap instantáneo en setFrame */
}

/* Caras laterales */

/* Digi-Egg colorized — clase .digi añadida por JS tras el reveal */
/* F1 (default) */
.module.digi .face.top   { background: var(--digi-top,   #f0fff0) !important; }
.module.digi .face.front { background: var(--digi-front, #f0f0f0) !important; }
.module.digi .face.right { background: var(--digi-right, #f0f0f0) !important; }
.module.digi .face.left  { background: var(--digi-left,  #f0f0f0) !important; }
.module.digi .face.back  { background: var(--digi-back,  #f0f0f0) !important; }
/* F2 — sobrescribe via clase en el board */
.board.frame2 .module.digi .face.top   { background: var(--digi2-top,   #f0fff0) !important; }
.board.frame2 .module.digi .face.front { background: var(--digi2-front, #f0f0f0) !important; }
.board.frame2 .module.digi .face.right { background: var(--digi2-right, #f0f0f0) !important; }
.board.frame2 .module.digi .face.left  { background: var(--digi2-left,  #f0f0f0) !important; }
.board.frame2 .module.digi .face.back  { background: var(--digi2-back,  #f0f0f0) !important; }

/* Rings: F1 default */
.pulse-ring.digi .face.top    { background: var(--digi-front, #f0f0f0) !important; }
.pulse-ring.digi .face.bottom { background: var(--digi-front, #f0f0f0) !important; }
.pulse-ring.digi .face.front  { background: var(--digi-front, #f0f0f0) !important; }
.pulse-ring.digi .face.right  { background: var(--digi-right, #f0f0f0) !important; }
.pulse-ring.digi .face.left   { background: var(--digi-left,  #f0f0f0) !important; }
.pulse-ring.digi .face.back   { background: var(--digi-back,  #f0f0f0) !important; }
/* Rings F2 — via clase en el board */
.board.frame2 .pulse-ring.digi .face.top    { background: var(--digi2-front, #f0f0f0) !important; }
.board.frame2 .pulse-ring.digi .face.bottom { background: var(--digi2-front, #f0f0f0) !important; }
.board.frame2 .pulse-ring.digi .face.front  { background: var(--digi2-front, #f0f0f0) !important; }
.board.frame2 .pulse-ring.digi .face.right  { background: var(--digi2-right, #f0f0f0) !important; }
.board.frame2 .pulse-ring.digi .face.left   { background: var(--digi2-left,  #f0f0f0) !important; }
.board.frame2 .pulse-ring.digi .face.back   { background: var(--digi2-back,  #f0f0f0) !important; }

/* BOTTOM — cara inferior de los ring cubes */
.face.bottom {
  width: 22px;
  height: 22px;
  top: 0; left: 0;
  transform: rotateX(180deg);  /* gira para mirar hacia -Z */
  background: #880066;
}

/* FRONT — pivota en el borde inferior del módulo, altura = var(--h) */
.face.front {
  width: 22px;
  height: var(--h);
  top: 22px;
  left: 0;
  transform-origin: 50% 0%;
  transform: rotateX(90deg);
}

/* RIGHT */
.face.right {
  width: var(--h);
  height: 22px;
  top: 0;
  left: 22px;
  transform-origin: 0% 50%;
  transform: rotateY(-90deg);
}

/* LEFT */
.face.left {
  width: var(--h);
  height: 22px;
  top: 0;
  left: calc(-1 * var(--h));
  transform-origin: 100% 50%;
  transform: rotateY(90deg);
}

/* BACK */
.face.back {
  width: 22px;
  height: var(--h);
  top: calc(-1 * var(--h));
  left: 0;
  transform-origin: 50% 100%;
  transform: rotateX(-90deg);
}

/* ---- Colores — módulo ACTIVO ---- */
.module.active .face.top   { background: #0a0019; }
.module.active .face.front { background: linear-gradient(to bottom, #3d0080 0%, #0a0019 100%); }
.module.active .face.right { background: linear-gradient(to right,  #300068 0%, #0a0019 100%); }
.module.active .face.left  { background: linear-gradient(to left,   #280058  0%, #0a0019 100%); }
.module.active .face.back  { background: linear-gradient(to top,    #200048  0%, #0a0019 100%); }

/* ---- Colores — módulo INACTIVO ---- */
.module.inactive .face.top   { background: #ede0ff; }
.module.inactive .face.front { background: linear-gradient(to bottom, #c8b8ee 0%, #d0c4f0 100%); }
.module.inactive .face.right { background: linear-gradient(to right,  #b8a8de 0%, #c8b8e8 100%); }
.module.inactive .face.left  { background: linear-gradient(to left,   #b0a0d8  0%, #c0b0e0 100%); }
.module.inactive .face.back  { background: linear-gradient(to top,    #a898cc  0%, #c8b8e8 100%); }

/* ---- Anillos de expansión (pulse rings) ---- */
.pulse-ring {
  position: absolute;
  width: 22px;
  height: 22px;
  transform-style: preserve-3d;
  overflow: visible;
}
/* Faces invisibles al inicio; snap instantaneo — sin fade */
.pulse-ring .face {
  opacity: 0;
}
.pulse-ring.visible .face {
  opacity: 1;
}
/* — Color: módulo QR activo (hereda los colores del huevo oscuro) — */
.pulse-ring.qr-active .face.top    { background: #0a0019; }
.pulse-ring.qr-active .face.bottom { background: #200048; }
.pulse-ring.qr-active .face.front  { background: linear-gradient(to bottom, #3d0080 0%, #200048 100%); }
.pulse-ring.qr-active .face.right  { background: linear-gradient(to right,  #300068 0%, #200048 100%); }
.pulse-ring.qr-active .face.left   { background: linear-gradient(to left,   #280058  0%, #200048 100%); }
.pulse-ring.qr-active .face.back   { background: linear-gradient(to top,    #3d0080 0%, #200048 100%); }
/* — Color: módulo QR inactivo (hereda los colores del huevo claro) — */
.pulse-ring.qr-inactive .face.top    { background: #ede0ff; }
.pulse-ring.qr-inactive .face.bottom { background: #a898cc; }
.pulse-ring.qr-inactive .face.front  { background: linear-gradient(to bottom, #c8b8ee 0%, #a898cc 100%); }
.pulse-ring.qr-inactive .face.right  { background: linear-gradient(to right,  #b8a8de 0%, #a898cc 100%); }
.pulse-ring.qr-inactive .face.left   { background: linear-gradient(to left,   #b0a0d8  0%, #a898cc 100%); }
.pulse-ring.qr-inactive .face.back   { background: linear-gradient(to top,    #c8b8ee 0%, #a898cc 100%); }
/* ---- Onda de pulso ---- */
#pulse-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  pointer-events: none;
  z-index: -1;
}
</style>

/* ---- Drag libre acumulativo ---- */
(function() {
  const wrapper = document.getElementById("wrapper");
  let rotX = 0, rotZ = 0;
  let dragging = false, lastX = 0, lastY = 0;
  let floating = true;   // true = animación CSS activa

  function killFloat() {
    if (!floating) return;
    floating = false;
    // inline animation: none gana sobre la clase CSS → sin snap-back
    wrapper.style.animation = "none";
    wrapper.style.transform = `rotateX(${rotX}deg) rotateZ(${rotZ}deg)`;
  }

  function apply() {
    wrapper.style.transform = `rotateX(${rotX}deg) rotateZ(${rotZ}deg)`;
  }

  /* Mouse */
  wrapper.addEventListener("mousedown", e => {
    e.preventDefault();
    killFloat();   // primera interacción: mata el float para siempre (hasta dblclick)
    dragging = true;
    lastX = e.clientX; lastY = e.clientY;
    wrapper.classList.add("dragging");
  });

  window.addEventListener("mousemove", e => {
    if (!dragging) return;
    rotZ += (e.clientX - lastX) * 0.5;
    rotX -= (e.clientY - lastY) * 0.5;
    lastX = e.clientX; lastY = e.clientY;
    apply();
  });

  window.addEventListener("mouseup", () => {
    dragging = false;
    wrapper.classList.remove("dragging");
    // NO re-habilitamos la animación → el transform queda donde el usuario lo dejó
  });

  /* Doble-click → reset completo */
  wrapper.addEventListener("dblclick", () => {
    rotX = 0; rotZ = 0;
    floating = true;
    wrapper.style.animation = "";   // devuelve control al CSS
    wrapper.style.transform = "";
  });

  /* Touch */
  wrapper.addEventListener("touchstart", e => {
    killFloat();
    dragging = true;
    lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
  }, {passive:true});

  wrapper.addEventListener("touchmove", e => {
    e.preventDefault();
    if (!dragging) return;
    rotZ += (e.touches[0].clientX - lastX) * 0.5;
    rotX -= (e.touches[0].clientY - lastY) * 0.5;
    lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
    apply();
  }, {passive:false});

  wrapper.addEventListener("touchend", () => { dragging = false; });
})();

/* ---- Egg reveal + Pulse 1s ---- */
(function() {
  const btn     = document.getElementById("btn");
  const board   = document.querySelector(".board");
  const modules = board.querySelectorAll(".module");
  const rings   = board.querySelectorAll(".pulse-ring");
  const BASE    = 26;
  const CUBE_H_JS = 26;

  let eggVisible  = false;
  let frame2      = false;
  let timer       = null;
  let colorsInited = false;

  const CASCADE = "--h .55s cubic-bezier(.34,1.56,.64,1), --bot .55s cubic-bezier(.34,1.56,.64,1)";

  /* Construye gradiente para las 4 caras laterales desde array de colores */
  function buildGrads(stops) {
    const h   = CUBE_H_JS;
    const seg = stops.map((c, i) => `${c} ${i*h}px ${(i+1)*h}px`).join(",");
    return {
      front: `linear-gradient(to bottom,${seg})`,
      right: `linear-gradient(to right,${seg})`,
      left:  `linear-gradient(to left,${seg})`,
      back:  `linear-gradient(to top,${seg})`,
    };
  }

  /* Bake colores F1+F2 como CSS vars en cada elemento — se llama UNA SOLA VEZ.
     setFrame ya no toca colores; el CSS toggle de .frame2 en .board lo hace. */
  function initDigiColors() {
    if (colorsInited) return;
    colorsInited = true;
    modules.forEach(m => {
      if (!m.dataset.digiStopsF1) return;
      const g1 = buildGrads(m.dataset.digiStopsF1.split("|"));
      const g2 = buildGrads(m.dataset.digiStopsF2.split("|"));
      m.style.setProperty("--digi-top",    m.dataset.digiTop);
      m.style.setProperty("--digi-front",  g1.front);
      m.style.setProperty("--digi-right",  g1.right);
      m.style.setProperty("--digi-left",   g1.left);
      m.style.setProperty("--digi-back",   g1.back);
      m.style.setProperty("--digi2-top",   m.dataset.digiTopF2);
      m.style.setProperty("--digi2-front", g2.front);
      m.style.setProperty("--digi2-right", g2.right);
      m.style.setProperty("--digi2-left",  g2.left);
      m.style.setProperty("--digi2-back",  g2.back);
    });
    rings.forEach(r => {
      if (!r.dataset.digiSideF1) return;
      const c1 = r.dataset.digiSideF1, c2 = r.dataset.digiSideF2 || c1;
      r.style.setProperty("--digi-front",  c1);
      r.style.setProperty("--digi-right",  c1);
      r.style.setProperty("--digi-left",   c1);
      r.style.setProperty("--digi-back",   c1);
      r.style.setProperty("--digi2-front", c2);
      r.style.setProperty("--digi2-right", c2);
      r.style.setProperty("--digi2-left",  c2);
      r.style.setProperty("--digi2-back",  c2);
    });
  }

  /* setFrame: 0 mutations en módulos — solo un toggle de clase en el board */
  function setFrame(toF2) {
    frame2 = toF2;
    board.classList.add("switching");        // bloquea transiciones
    board.classList.toggle("frame2", toF2); // CSS override de --h y colores
    rings.forEach(r => r.classList.toggle("visible", toF2));
    // Doble-RAF: primer RAF schedula el segundo; el paint ocurre entre ambos
    // → el browser pinta el snap ANTES de que se quite "switching"
    requestAnimationFrame(() => requestAnimationFrame(() =>
      board.classList.remove("switching")
    ));
  }

  function revealEgg() {
    initDigiColors();
    modules.forEach(m => {
      m.style.transition      = CASCADE;
      m.style.transitionDelay = m.dataset.upDelay + "ms";
      m.style.setProperty("--h",   m.dataset.target + "px");
      m.style.setProperty("--bot", m.dataset.bot    + "px");
    });
    /* Stagger clase .digi por fila — más delay para que el huevo termine de subir */
    modules.forEach((m, i) => {
      if (!m.dataset.digiStopsF1) return;
      const delay = 1400 + Math.floor(i / 21) * 90;
      setTimeout(() => m.classList.add("digi"), delay);
    });
    rings.forEach(r => r.classList.add("digi"));
  }

  function hideEgg() {
    /* Eliminar .frame2 antes del hide para que inline --h domine */
    board.classList.add("switching");
    board.classList.remove("frame2");
    requestAnimationFrame(() => {
      board.classList.remove("switching");
      modules.forEach(m => {
        m.style.transition      = CASCADE;
        m.style.transitionDelay = m.dataset.downDelay + "ms";
        m.style.setProperty("--h",   BASE + "px");
        m.style.setProperty("--bot", "0px");
        m.classList.remove("digi");
      });
      rings.forEach(r => { r.classList.remove("digi"); r.classList.remove("visible"); });
    });
  }

  btn.addEventListener("click", () => {
    eggVisible = !eggVisible;
    if (eggVisible) {
      revealEgg();
      timer = setInterval(() => setFrame(!frame2), 1000);
    } else {
      clearInterval(timer); timer = null;
      frame2 = false;
      hideEgg();
    }
    btn.classList.toggle("egg-on", eggVisible);
  });
})();
/* ---- Onda de pulso (Canvas) ---- */
(function() {
  try {
  const canvas = document.getElementById("pulse-canvas");
  const ctx    = canvas.getContext("2d");
  let   animId = null;

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener("resize", resize);
  resize();

  /* gauss helper solo para el spike central */
  function gauss(x, cx, s, a) {
    return a * Math.exp(-0.5 * Math.pow((x - cx) / s, 2));
  }

  function makePoints() {
    const W   = canvas.width;
    const CY  = canvas.height * 0.5;
    const AMP = canvas.height * 0.36;
    const r   = () => Math.random();   /* shorthand */

    /* ---- Capa 1: zigzag angular — posicion+altura varían levemente por click ---- */
    /* Cada keyframe tiene un offset aleatorio pequeño bakeado al inicio del call */
    const baseKeys = [
      [0.00,  0.00, 0,    0   ],  /* [t, dy, dt_range, ddy_range] */
      [0.06, -0.10, 0.02, 0.05],
      [0.12,  0.18, 0.02, 0.06],
      [0.18, -0.22, 0.02, 0.07],
      [0.23,  0.14, 0.02, 0.06],
      [0.28, -0.08, 0.02, 0.05],
      [0.34,  0.06, 0.02, 0.04],
      [0.37, -0.05, 0.01, 0.04],
      [0.40,  0.28, 0.02, 0.07],
      [0.46, -0.60, 0.02, 0.08],  /* picos raros */
      [0.52,  0.65, 0.02, 0.08],
      [0.57, -0.56, 0.02, 0.07],
      [0.63,  0.60, 0.02, 0.08],
      [0.68, -0.52, 0.02, 0.07],
      [0.74,  0.55, 0.02, 0.07],
      [0.80, -0.44, 0.02, 0.06],
      [0.86,  0.36, 0.02, 0.06],
      [0.92, -0.18, 0.02, 0.05],
      [0.97,  0.07, 0.01, 0.03],
      [1.00,  0.00, 0,    0   ],
    ];

    /* Bake los offsets UNA vez por click */
    const keys = baseKeys.map(([t, dy, dt, ddy]) => [
      t  + (r() - 0.5) * dt,
      dy + (r() - 0.5) * ddy,
    ]);
    /* Garantizar orden creciente en t (los offsets son pequeños pero por si acaso) */
    keys.sort((a, b) => a[0] - b[0]);

    function interp(t) {
      for (let i = 0; i < keys.length - 1; i++) {
        if (t >= keys[i][0] && t <= keys[i+1][0]) {
          const p = (t - keys[i][0]) / (keys[i+1][0] - keys[i][0]);
          return keys[i][1] + (keys[i+1][1] - keys[i][1]) * p;
        }
      }
      return 0;
    }

    /* ---- Capa 2: spike gaussiano — posicion libre por toda la onda ---- */
    const spikeCX  = W * (0.20 + r() * 0.60);   /* 20%–80% del ancho */
    const spikeAmp = canvas.height * (0.44 + (r() - 0.5) * 0.10); /* ±5% alto */
    const dipCX    = spikeCX + W * (0.022 + r() * 0.008);
    const pBumpCX  = spikeCX - W * (0.07  + r() * 0.02);

    const pts = [];
    for (let x = 0; x <= W; x += 2) {
      const t   = x / W;
      const env = Math.sin(t * Math.PI);

      const angular = interp(t) * env * AMP;
      const spike   = gauss(x, spikeCX, W * 0.016, -spikeAmp);
      const sDip    = gauss(x, dipCX,   W * 0.013,  canvas.height * 0.20);
      const pBump   = gauss(x, pBumpCX, W * 0.022, -canvas.height * 0.09);
      const jitter  = (r() - 0.5) * canvas.height * 0.022 * env;

      pts.push([x, CY - angular + spike + sDip + pBump + jitter]);
    }
    return pts;
  }

  function drawWave(pts, alpha) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    /* glow capas */
    ["#7700aa", "#b400ff"].forEach((col, i) => {
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(pts[0][0], pts[0][1]);
      for (let k = 1; k < pts.length; k++) ctx.lineTo(pts[k][0], pts[k][1]);
      ctx.strokeStyle = col;
      ctx.lineWidth   = i === 0 ? 18 : 8;
      ctx.globalAlpha = alpha * (i === 0 ? 0.25 : 0.5);
      ctx.shadowColor = "#b400ff";
      ctx.shadowBlur  = i === 0 ? 30 : 12;
      ctx.stroke();
      ctx.restore();
    });
    /* linea principal negra */
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let k = 1; k < pts.length; k++) ctx.lineTo(pts[k][0], pts[k][1]);
    ctx.strokeStyle = "#000000";
    ctx.lineWidth   = 2.5;
    ctx.globalAlpha = alpha;
    ctx.stroke();
    ctx.restore();
  }

  function triggerWave() {
    if (animId) { cancelAnimationFrame(animId); animId = null; }
    const pts   = makePoints();
    const TOTAL = 950;
    const start = performance.now();
    function frame(ts) {
      const t = Math.min((ts - start) / TOTAL, 1);
      let alpha;
      if      (t < 0.12) alpha = t / 0.12;
      else if (t < 0.70) alpha = 1;
      else               alpha = 1 - (t - 0.70) / 0.30;
      drawWave(pts, alpha);
      if (t < 1) { animId = requestAnimationFrame(frame); }
      else       { ctx.clearRect(0, 0, canvas.width, canvas.height); animId = null; }
    }
    animId = requestAnimationFrame(frame);
  }

  /* listener propio — aislado del click del huevo */
  const btn = document.getElementById("btn");
  if (btn) {
    btn.addEventListener("click",     triggerWave);
    btn.addEventListener("touchstart", triggerWave, {passive:true});
  }
  window._triggerWave = triggerWave;
  } catch(e) { console.error("[pulse-wave]", e); }
})();
</script>
</body>
